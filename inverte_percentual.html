<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inversor de porcentagem</title>
    <link rel="stylesheet" href="estilo.css">
</head>
<body>
    <div class="card" style="margin-top: 20px;">
    <p> <a href="index.html">Retornar à página inicial</a> </p>
    <h2>Inversor de Porcentagem</h2>
    <p>Descubra quanto é necessário para retornar ao valor original.<p>

    <div class="input-group">
        <label for="inversorTipo">Tipo de Alteração Inicial</label>
        <select id="inversorTipo" title="Tipo de Alteração Inicial">
            <option value="desconto">Eu dei um Desconto</option>
            <option value="aumento">Eu dei um Aumento</option>
        </select>
    </div>

    <div class="input-group">
        <label>Percentual Aplicado (%)</label>
        <input type="number" id="percentualInput" placeholder="Ex: 50" oninput="calcularInversao()">
    </div>

    <div id="resultado-inversao" class="result-area" style="background: #f0fdf4; padding: 15px; border-radius: 8px; margin-top: 10px; display: none; text-align: center;">
        <span id="textoInversao" style="font-weight: 600; color: #166534; font-size: 1.1rem;"></span>
    </div>
</div>
<script src="invertScript.js"></script>
</body>
</html>
