<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Preço Composto</title>
    <link rel="stylesheet" href="estilo.css">
</head>
<body>

<div class="card">
    <p> <a href="index.html">Retornar à página inicial</a> </p>
    <h2>Calculadora de Preço</h2>
    
    <div class="input-group">
        <label>Preço Inicial (R$)</label>
        <input type="number" id="initialPrice" placeholder="Ex: 200" step="0.01">
        <label>Saldo (R$)</label>
        <input type="number" id="saldo" placeholder="Ex: 400" step="0.01">
    </div>

    <div id="modifiers-container"></div>

    <button class="btn btn-add" id="btnAdd" onclick="addRow()">+ Adicionar Ajuste (Máx 10)</button>
    <button class="btn btn-calc" onclick="calculate()">Calcular Resultado</button>

    <div id="result-area" style="display: none;">
        <span>Preço Final:</span>
        <span class="final-price" id="displayResult">R$ 0,00</span>
        <span class="comparativo" id="displayComparativo"></span>
        <span class="compravel" id="displayCompravel"></span>
    </div>
</div>

<script src="desc_au.js"></script>

</body>
</html>
